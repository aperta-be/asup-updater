# Vale configuration file
# See: https://vale.sh/docs/topics/config/

StylesPath = styles
MinAlertLevel = suggestion

# Use Vale's built-in rules
Vocab = Base

# Global settings
[*]
# List of installed styles to use
BasedOnStyles = Vale, write-good, proselint

# Ignore code blocks, front matter, and links
TokenIgnores = (\x60[^\x60]+\x60), (^---[\s\S]*?---), (\[.+\]\(.+\))

# Ignore comments
IgnoredScopes = code, tt

# Custom vocabulary
Packages = Google

# Specific rules for Markdown files
[*.md]
# Additional styles for documentation
write-good.E-Prime = NO
write-good.Weasel = YES
write-good.TooWordy = YES
write-good.Passive = YES
write-good.So = YES
write-good.ThereIs = YES
write-good.Illusions = YES

# Customize specific rules
Vale.Spelling = YES
Vale.Terms = YES
Vale.Repetition = YES
Vale.Hedging = YES
Vale.PassiveVoice = YES

# Technical documentation allowances
Vale.Acronyms = NO
Vale.Spelling.Ignore = PHP, API, CI, CD, VCS, GitLab, GitHub, Mattermost, Docker, Composer

# Custom vocabulary exceptions
Vale.Terms.Ignore = composer.json, composer.lock, .env, Dockerfile

# Documentation-specific settings
[docs/*.md]
# Additional technical documentation styles
write-good.TooWordy = NO
write-good.Passive = NO

# API documentation allowances
Vale.Acronyms = YES
Vale.PassiveVoice = NO

# Configuration documentation settings
[docs/configuration.md]
# Allow more technical language
write-good.TooWordy = NO
Vale.Hedging = NO

# Contributing guide settings
[CONTRIBUTING.md]
# Stricter rules for contributor documentation
write-good.Weasel = ERROR
write-good.TooWordy = ERROR
Vale.Hedging = ERROR

# Security policy settings
[SECURITY.md]
# Stricter rules for security documentation
write-good.Weasel = ERROR
Vale.Hedging = ERROR
Vale.PassiveVoice = ERROR