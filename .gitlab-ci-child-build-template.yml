# Build release <TAG>-<PHP_VERSION>
build_image:<PHP_VERSION>:
  stage: build
  tags:
    - sandbox
  before_script:
    # - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    # $CI_REGISTRY_USER and $CI_REGISTRY_PASSWORD expires when the job is finished.
    # For long-lived access to the registry we have to use a deploy token
    # and pass it to the job via the CI/CD variables.
    # Tags must be protected for the main (release) build to access the variables.
    - docker login $CI_REGISTRY -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD
  script:
    - if [[ "<TAG>" == "dev" ]]; then ./generate-env.sh "develop-<PHP_VERSION>"; fi;
    - docker build -t $CI_REGISTRY_IMAGE:<TAG>-<PHP_VERSION> . -f <DOCKERFILE> --build-arg PHP_VERSION=<PHP_VERSION>
    - docker image push $CI_REGISTRY_IMAGE:<TAG>-<PHP_VERSION>
    - docker rmi -f $CI_REGISTRY_IMAGE:<TAG>-<PHP_VERSION>

