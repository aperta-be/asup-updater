# Build release <TAG>-<PHP_VERSION>
build_image:<PHP_VERSION>:
  stage: build
  tags:
    - sandbox
  before_script:
    #- docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - ./build.sh
    - docker build -t $CI_REGISTRY_IMAGE:<DEV_TAG><TAG>-<PHP_VERSION> . -f <DOCKERFILE> --build-arg PHP_VERSION=<PHP_VERSION>
    - docker push $CI_REGISTRY_IMAGE --all-tags
    - docker rmi $CI_REGISTRY_IMAGE:<DEV_TAG><TAG>-<PHP_VERSION>

