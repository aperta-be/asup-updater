title: ASUP Open Source Updater Documentation
description: Documentation for the ASUP Open Source Updater (Automated Software Utility Platform)
theme: jekyll-theme-minimal

# GitHub Pages settings
url: ""
baseurl: "/asup-updater"

# Build settings
markdown: kramdown
highlighter: rouge

# Navigation
header_pages:
  - index.md
  - getting-started.md
  - configuration.md
  - api.md
  - architecture.md
  - troubleshooting.md

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - README.md

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap