stages:
  - trigger
  - build
  - test

# Generate child pipelines
.factory: &factory
  stage: trigger
  tags:
    - sandbox
  artifacts:
    expire_in: 1 week
    paths:
      - .gitlab-ci-child-build-dynamic.yml
      - .gitlab-ci-child-test-dynamic.yml

factory:develop:
  <<: *factory
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    # Execute CI factory and pass the last used tag
    - export LAST_TAG="dev"
    - echo "Building ASUP Release ${LAST_TAG}"
    - ./ci-factory.sh ${LAST_TAG}

# Build develop releases
trigger:build:develop:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  trigger:
    strategy: depend
    include:
      - artifact: .gitlab-ci-child-build-dynamic.yml
        job: factory:develop
  needs:
    - job: factory:develop
      artifacts: true

# Test develop releases
trigger:test:
  stage: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  trigger:
    include:
      - artifact: .gitlab-ci-child-test-dynamic.yml
        job: factory:develop
  needs:
    - job: factory:develop
      artifacts: true
    - job: trigger:build:develop


factory:production:
  <<: *factory
  stage: trigger
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: never
    - if: $CI_COMMIT_TAG
      when: always
  script:
    # Execute CI factory and pass the last used tag
    - export LAST_TAG=$(git describe --tags --abbrev=0)
    - echo "Building ASUP Release ${LAST_TAG}"
    - ./ci-factory.sh ${LAST_TAG}

# Build releases
trigger:build:production:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: never
    - if: $CI_COMMIT_TAG
      when: always
  trigger:
    strategy: depend
    include:
      - artifact: .gitlab-ci-child-build-dynamic.yml
        job: factory:production
  needs:
    - job: factory:production
      artifacts: true
