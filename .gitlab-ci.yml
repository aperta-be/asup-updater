stages:
  - develop
  - production

Build development:
  stage: develop
  tags:
    - buster
  only:
    - develop
  before_script:
    - echo "Docker info:"
    - docker info
    - docker images | grep asup
  script:
    - ./build.sh

Test development:
  stage: develop
  tags:
    - buster
  only:
    - develop
  needs: ["Build development"]
  script:
    - echo "Docker images:"
    - docker images | grep asup
    - ./test.sh

build_image:
  stage: production
  tags:
    - buster
  only:
    - tags
  before_script:
    - docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE --all-tags
    - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
