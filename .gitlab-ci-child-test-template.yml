# Test release <TAG>-<PHP_VERSION>
test_image:<PHP_VERSION>:
  stage: test
  tags:
    - sandbox
  before_script:
    #- docker info
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - if [[ "<TAG>" == "dev" ]]; then ./generate-env.sh "develop-<PHP_VERSION>"; fi;
    - echo "Test Gihub VCS"
    - docker run --env-file='.env_github' $CI_REGISTRY_IMAGE:<TAG>-<PHP_VERSION>
    - echo "Test Gilab VCS"
    - docker run --env-file='.env_gitlab' $CI_REGISTRY_IMAGE:<TAG>-<PHP_VERSION>

